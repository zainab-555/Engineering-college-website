<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/splide.min.css">
</head>
<style>
    .overlay-text {
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
    }
</style>
<body>
    <div class="row">
        <div class="col-sm-10 mx-auto mt-5">
            <section class="splide text-center" aria-label="Splide Basic HTML Example">
                <div class="splide__track">
                    <ul class="splide__list">
                        <li class="splide__slide px-3">
                            <div class="card h-100 border-0 rounded-3">
                                <img src="images/ev1.jpg" alt="" height="200" class="rounded-3">
                                <h5 class="position-absolute overlay-text bottom-0 py-2 w-100 mb-0 rounded-bottom-3">
                                    Winning Movement</h5>
                            </div>
                        </li>
                        <li class="splide__slide px-3">
                            <div class="card">
                                <img src="images/ev2.jpg" height="200" alt="">
                                <h5 class="position-absolute overlay-text bottom-0 py-2 w-100 mb-0 rounded-bottom-3">
                                    Winning Movement</h5>
                            </div>
                        </li>
                        <li class="splide__slide px-3">
                            <div class="card">
                                <img src="images/ev3.jpg" height="200" alt="">
                                <h5 class="position-absolute overlay-text bottom-0 py-2 w-100 mb-0 rounded-bottom-3">
                                    Winning Movement</h5>
                            </div>
                        </li>
                        <li class="splide__slide px-3">
                            <div class="card">
                                <img src="images/ev4.jpg" height="200" alt="">
                                <h5 class="position-absolute overlay-text bottom-0 py-2 w-100 mb-0 rounded-bottom-3">
                                    Winning Movement</h5>
                            </div>
                        </li>
                        <li class="splide__slide px-3">
                            <div class="card">
                                <img src="images/ev5.jpg" height="200" alt="">
                                <h5 class="position-absolute overlay-text bottom-0 py-2 w-100 mb-0 rounded-bottom-3">
                                    Winning Movement</h5>
                            </div>
                        </li>
                    </ul>
                </div>
            </section>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/splide.min.js"></script>
    <script>
        var splide = new Splide('.splide', {
            type: 'loop',
            perPage: 4,
            perMove: 1,
            gap: "15px",
            breakpoints: {
                400: {
                    perPage: 1
                },

                600: {
                    perPage: 2
                },
                1000: {
                    perPage: 3
                }

            }
        });

        splide.mount();
    </script>
</body>

</html>
